<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Arena | local LAN 2-Player Combat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Phaser 3 CDN (using standard arcade physics build) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <!-- Socket.io client (served by Node.js automatically) -->
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <canvas id="gpu-bg"></canvas>
    <div id="game-container"></div>
    <script type="importmap">
        {
            "imports": {
                "typegpu": "https://unpkg.com/typegpu@latest/dist/index.js"
            }
        }
    </script>
    <script type="module" src="bg-shader.js"></script>
    <!-- config.js MUST be first so CONFIG is defined before audio.js reads it -->
    <script src="config.js"></script>
    <script src="audio.js"></script>
    <script src="arena.js"></script>
    <script src="menu.js"></script>
    <script src="game.js"></script>
</body>

</html>
