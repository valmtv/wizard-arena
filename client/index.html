<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Arena | local LAN 2-Player Combat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>

<body>
    <canvas id="gpu-bg"></canvas>
    <div id="game-container"></div>

    <!--
        Load order — each file depends only on what's above it:

        1. config.js    — API keys (must be first)
        2. audio.js     — mic capture + Gemini; sets playerSpeed global
        3. arena.js     — window.ARENAS definitions
        4. utils.js     — createCircleTexture, createSpellTextures, volumeToScale, createSoulsButton
        5. spells.js    — SpellCaster class; registers window.spellCaster
        6. fishjam.js   — replaces socket.js; peer metadata + voice chat
        7. scenes/      — Phaser Scene classes
        8. game.js      — Phaser.Game instantiation
        9. bg-shader.js — WebGPU background (async, independent)
    -->
    <script src="config.js"></script>
    <script src="audio.js"></script>
    <script src="arena.js"></script>
    <script src="utils.js"></script>
    <script src="spells.js"></script>
    <script type="module" src="fishjam.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/EndScene.js"></script>
    <script src="scenes/GameScene.js"></script>

    <script type="module" src="spell-fx.js"></script>
    <script type="module" src="game.js"></script>
    <script type="module" src="bg-shader.js"></script>
</body>

</html>
